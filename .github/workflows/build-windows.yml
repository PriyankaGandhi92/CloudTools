name: Build Windows Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './pdf-editor/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: pdf-editor
        run: npm ci

      - name: Build frontend
        working-directory: pdf-editor
        run: npm run build

      - name: Build Tauri app
        working-directory: pdf-editor
        run: npm run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            pdf-editor/src-tauri/target/release/bundle/msi/*.msi
            pdf-editor/src-tauri/target/release/bundle/nsis/*.exe
