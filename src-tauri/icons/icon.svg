<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" />
  
  <!-- Document icon -->
  <rect x="18" y="12" width="28" height="36" rx="2" fill="white" />
  
  <!-- Document fold -->
  <path d="M46 12 L46 20 L38 20 Z" fill="#e5e7eb" />
  
  <!-- Pen tool icon -->
  <g transform="translate(36, 36) rotate(45)">
    <rect x="-2" y="-12" width="4" height="16" fill="#3b82f6" />
    <polygon points="-2,4 2,4 0,8" fill="#1e40af" />
  </g>
  
  <!-- Grid lines (blueprint style) -->
  <g stroke="white" stroke-width="0.5" opacity="0.3">
    <line x1="22" y1="18" x2="42" y2="18" />
    <line x1="22" y1="24" x2="42" y2="24" />
    <line x1="22" y1="30" x2="42" y2="30" />
    <line x1="22" y1="36" x2="42" y2="36" />
    <line x1="22" y1="42" x2="42" y2="42" />
  </g>
</svg>
