<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      margin: 0;
    }
    h2 {
      font-size: 14px;
      margin: 0 0 12px 0;
      color: #60a5fa;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }
    .toggle-label {
      flex: 1;
      font-size: 12px;
      line-height: 1.4;
    }
    .toggle-sublabel {
      font-size: 10px;
      color: #888;
      display: block;
      margin-top: 2px;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider {
      background: #3b82f6;
    }
    input:checked + .slider::before {
      transform: translateX(18px);
    }
    .status {
      font-size: 10px;
      padding: 6px 8px;
      border-radius: 6px;
      margin-top: 12px;
    }
    .status.on {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
    }
    .status.off {
      background: rgba(255, 255, 255, 0.05);
      color: #888;
    }
    .file-picker {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .file-picker button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .file-picker button:hover {
      background: #2563eb;
    }
    .file-picker button:active {
      background: #1d4ed8;
    }
    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>
  <h2>🔷 BluePrint PDF Viewer</h2>

  <div class="toggle-row">
    <div class="toggle-label">
      Open PDFs in BluePrint
      <span class="toggle-sublabel">Redirect all PDF files to BluePrint editor</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="enableToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="status off" id="statusMsg">
    PDF interception is disabled
  </div>

  <div class="file-picker">
    <button id="openLocalPdf">📂 Open Local PDF</button>
    <input type="file" id="fileInput" accept=".pdf" />
  </div>

  <script src="popup.js"></script>
</body>
</html>
